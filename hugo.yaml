baseURL: https://wenwangjain.github.io/
languageCode: zh-cn
title: Hugo site
theme: hextra


outputs:
  home: [HTML]
  page: [HTML]
  section: [HTML, RSS]


defaultContentLanguage: zh-cn
languages:
  zh-cn:
    languageName: 简体中文
    languageCode: zh-cn
    weight: 1
    title: DataSP



menu:
  main:
    - identifier: documentation
      name: 文档
      pageRef: /docs
      weight: 1
    - identifier: project
      name: 项目
      pageRef: /project
      weight: 2
    - identifier: exercises
      name: 练习
      pageRef: /exercises
      weight: 3
    - identifier: about
      name: 关于
      pageRef: /about
      weight: 4
      
    - name: Search
      weight: 5
      params:
        type: search

    - name: GitHub
      weight: 6
      url: "https://github.com/imfing/hextra"
      params:
        icon: github




# Hugo 使用 Goldmark 解析 Markdown。 Markdown 渲染可以在 hugo.yaml 中的 markup.goldmark 中配置。以下是Hextra的默认配置：
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false



params:
  description: Modern, responsive, batteries-included Hugo theme for creating beautiful static websites.

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo-dark.svg
      width: 50
      height: 50
      # link: /
    width: wide


  page:
    # full (100%), wide (90rem), normal (1280px)
    width: wide
  

  theme:
    # light | dark | system
    default: system
    displayToggle: true


  footer:
    enable: true
    displayCopyright: false
    displayPoweredBy: true
    width: wide







